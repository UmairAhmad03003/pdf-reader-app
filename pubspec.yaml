name: pdftest
description: "PDF Master App - A professional PDF utility application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  syncfusion_flutter_pdfviewer: ^27.1.52
  syncfusion_flutter_pdf: ^27.1.52
  pdf: ^3.10.4
  printing: ^5.11.0
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  flutter_riverpod: ^2.4.9
  get_it: ^7.6.4
  shared_preferences: ^2.2.2
  path: ^1.8.3
  signature: ^5.4.0
  flutter_screenutil: ^5.9.0
  go_router: ^12.1.3
  flutter_svg: ^2.0.9
  intl: ^0.18.1
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
